[colors.primary]
background = "{{ colors.background.default.hex }}"
foreground = "{{ colors.on_background.default.hex }}"

[colors.search.matches]
foreground = "{{ colors.on_primary_container.default.hex }}"
background = "{{ colors.primary_container.default.hex }}"

[colors.search.focused_match]
foreground = "{{ colors.on_primary.default.hex }}"
background = "{{ colors.primary.default.hex }}"

[colors.footer_bar]
foreground = "{{ colors.on_primary.default.hex }}"
background = "{{ colors.primary.default.hex }}"

[colors.hints.start]
foreground = "{{ colors.surface_variant.default.hex }}"
background = "{{ colors.secondary.default.hex }}"

[colors.hints.end]
foreground = "{{ colors.surface_variant.default.hex }}"
background = "{{ colors.secondary.default.hex }}"

[colors.normal]
black = "{{ colors.surface_container_high.default.hex }}"
red = "{{ colors.red.default.hex }}"
green = "{{ colors.green.default.hex }}"
yellow = "{{ colors.yellow.default.hex | saturate: 75.0, hsl }}"
blue = "{{ colors.blue.default.hex }}"
magenta = "{{ colors.magenta.default.hex }}"
cyan = "{{ colors.cyan.default.hex }}"
white = "{{ colors.outline.default.hex }}"

[colors.bright]
black = "{{ colors.surface_container_lowest.default.hex }}"
red = "{{ colors.red.default.hex | auto_lightness: 15.0 }}"
green = "{{ colors.green.default.hex | auto_lightness: 15.0 }}"
yellow = "{{ colors.yellow.default.hex | auto_lightness: 10.0 | saturate: 75.0, hsl }}"
blue = "{{ colors.blue.default.hex | auto_lightness: 15.0 }}"
magenta = "{{ colors.magenta.default.hex | auto_lightness: 15.0 | saturate: 25.0, hsl }}"
cyan = "{{ colors.cyan.default.hex | auto_lightness: 15.0 | saturate: 25.0, hsl }}"
white = "{{ colors.on_surface.default.hex }}"
