[colors.primary]
background = "{{colors.background.default.hex}}"
foreground = "{{colors.on_surface.default.hex}}"


[colors.search.matches]
foreground = "{{colors.on_primary_container.default.hex}}"
background = "{{colors.primary_container.default.hex}}"


[colors.search.focused_match]
foreground = "{{colors.on_primary.default.hex}}"
background = "{{colors.primary.default.hex}}"


[colors.footer_bar]
foreground = "{{colors.on_primary.default.hex}}"
background = "{{colors.primary.default.hex}}"


[colors.hints.start]
foreground = "{{colors.surface_variant.default.hex}}"
background = "{{colors.secondary.default.hex}}"


[colors.hints.end]
foreground = "{{colors.surface_variant.default.hex}}"
background = "{{colors.secondary.default.hex}}"


[colors.normal]
black = "{{colors.on_surface.default.hex}}"
red = "{{colors.error.default.hex}}"
green = "{{colors.primary.default.hex}}"
yellow = "{{colors.error.default.hex | set_hue: 50 | auto_lightness: -5}}"
blue = "{{colors.tertiary.default.hex}}"
magenta = "{{colors.secondary.default.hex}}"
cyan = "{{colors.primary.default.hex | blend: {{colors.tertiary.default.hex}}, 0.5}}"
white = "{{colors.surface_container_lowest.default.hex}}"


[colors.bright]
black = "{{colors.on_surface.default.hex | auto_lightness: 5}}"
red = "{{colors.error.default.hex | auto_lightness: 5}}"
green = "{{colors.primary.default.hex | auto_lightness: 5}}"
yellow = "{{colors.error.default.hex | set_hue: 50}}"
blue = "{{colors.tertiary.default.hex | auto_lightness: 5}}"
magenta = "{{colors.secondary.default.hex | auto_lightness: 5}}"
cyan = "{{colors.primary.default.hex | blend: {{colors.tertiary.default.hex}}, 0.5 | auto_lightness: 5}}"
white = "{{colors.surface_container_lowest.default.hex | auto_lightness: 5}}"
